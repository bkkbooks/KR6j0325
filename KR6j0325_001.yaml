body:
  text: 西天譯經三藏朝散大夫試鴻臚少卿傳教大師臣法天奉詔譯歸命一切如來應供遍知覺我今說此一切如來心真言若有天人持明仙眾歸命供養一切諸佛受持讀誦及讚說真言通達法相若稱唵字是圓滿義若稱曩字是離怖畏義亦名破魔義若稱野字是破繫縛義若稱娑字是降伏冤家障礙義若稱儞字是破壞冤敵義若怖畏者以真言力遠離怖畏即說陀羅尼曰唵引㪍哩二合俱胝怛胝吠無每切怛胝吠怛胝吠怛胝濕吠二合多惹胝儞薩嚩二合引賀引薩嚩二合引賀引迦引囉引蓃數引倪也二合引能鉢訥麼二合褐薩覩二合引訥婆二合嚩引嚩囉引麼羅怛囉二合野尾曩引舍引野尾婆引嚩怛囉二合尾母引左儞引吽迦引哩引悉怛哩三合婆嚩𠰒嚩二合路麼迦引嚕麼引羅伽引多儞引薩嚩二合引賀引迦引哩引拏補瑟致也三合鑁惹迦引哩引昝麼曩引舍南曩引麼引佉也二合引閉多怛吠二合引曩㪍哩二合俱引吒也二合引瑟吒二合設多儞吠無每切尾儞喻二合引多麼引尾儞也二合引馱哩引尾儞焰二合引麼囉儞嚩引悉儞引尾儞也二合引倪禰嚩也二合嚕引閉室哩二合引尾儞也二合引囉引惹引波囉引𠰒仁際切多引阿𠰒多僧怛囉二合引娑引怛囉二合娑儞引尾覲曩二合伽引多儞鉢訥莽二合引擬引鉢訥麼二合經惹梨計二合引鉢訥母二合引訥婆二合引嚩尾舍引梨儞引誐上哩濕吠二合引多麼引邏并誐嚕閉左并誐計引舍引擬儞二合捫左惹引入嚩二合攞儞引怛引波儞嘮引捺哩二合引俱麼引哩引尾濕嚩二合嚕閉抳引誐上麼引哩引蘇沒囉二合多引設引多引索乞叉二合引多引捺多引𠰒多麼蹉囉引地也二合引曩式羅麼底鉢囉二合倪也二合引虞拏倪也二合引虞拏娑引誐囉引多囉抳引多引囉抳引怛怛嚩二合倪也二合引怛怛嚩二合三婆嚩引鉢訥麼二合褐薩覩二合引訥婆二合嚩引也囉引馱迦尾引囉引嚩嚕引多麼引嚩囉那引嚩囉三布囉拏二合引那舍普引彌鉢囉二合底瑟恥二合多誐哩𠰒二合多引銘引伽僧迦引舍尾儞喻二合帝引惹引仁臧切迦三婆嚩引毛𠰒引惹致引惹吒引馱哩引沒囉二合憾麼二合尾儞也二合引馱哩引嚩囉引馱囉抳引馱引囉抳引馱帝引那引曩尾儞也二合引波囉引訖囉二合麼拶覩哩普二合惹引拶覩哩能二合瑟吒囉三合引普惹引娑賀薩囉二合引波囉引𠰒多引拶覩哩嚩二合訖怛囉三合引儞引迦嚩訖怛囉三合引左嚩訖怛囉三合洛乞叉二合波囉引𠰒多引怛哩二合儞引怛囉二合引尾嚩也二合儞引怛囉二合引左颯鉢多二合洛乞叉二合引哩迦二合路左曩引半左路引左曩三布囉拏二合引沙吒鼻二合倪也二合引倪也二合引曩路引左曩引阿鉢囉二合麼引拏引鉢囉二合麼引拏引左濟喻二合引麼波引多引羅布引囉抳引速乞叉麼三合引囉他二合引尾藥二合訖多二合引儼鼻引囉引尾儞也二合引那引儞引濕嚩二合哩引波囉引阿擬儞二合計尸引禰舍𠰒嚩二合梨引娑賀薩囉二合引哩唧二合哩𠰒嚩三合梨多引曩底引嚩賀儞二合入嚩二合引洛引加散多引閉𠰒嚩二合梨燈引擬引娑迦曼拏路佉陵誐二合爍訖底二合馱囉引播舍引訖哩二合瑟拏二合引𠰒曩儞嚩引枲儞引惡乞叉二合素怛囉二合馱囉引尾儞也二合引難拏鉢訥莽二合引俱尸引娑囉薩頗二合囉仡哩二合呬引多引娑怛囉三合𪾼迦𠰒嚩二合攞引鉢囉二合禰寧挹切引波儞引那賀曩引麼引攞尾覲曩二合引多引鉢囉二合𠰒嚩二合羅帝引怛哩二合輸梨儞引阿𠰒仁際切鐙惹野引惹野底引嚩濕吠二合引多鉢訥莽二合引誐麼引梨儞引迦彌儞引迦彌儞引迦引麼嚕引閉引左悉地悉地嚩囉鉢囉二合那尾怖史多引楞訖哩二合鐙引擬引左儞哩普二合引灑拏蘇普灑拏引部多麼引多引尾舍引洛乞史二合引鉢訥麼二合計娑囉麼引梨儞引普彌儞引嚩日囉二合三鼻禰引作訖囉二合𠰒嚩二合引路洛迦二合播引多儞引薩達哩麼馱引囉抳引每引怛囉二合娑引尾孕二合怛哩二合引沒馱麼引多引左巘引馱引哩引捺囉二合引彌抳引贊抳舍引嚩哩引舍引嚩哩引母儞引娑賀薩囉二合引羯哩麼二合引麼賀瑜藝羯哩麼二合悉馱引怛哩二合尾訖囉二合麼引鉢囉二合珊曩引畝伽播引舍引左迦嚕引拏引薩怛嚩二合嚩蹉攞惹誐底引馱引怛哩二合三半曩引儞哩嚩二合抳引蘇鉢囉二合底丁逸切瑟恥二合多引薩嚩二合引賀引此一百八名祕密真言若有一心受持讀誦若自書寫若為人解說增壽吉祥端正福相眾人愛敬遠離魔境出生死難而彼天人阿修羅恭敬供養復得天龍藥叉乾闥婆阿修羅迦樓羅緊那羅誐嚕拏等持明仙眾尊重讚嘆所有枷鎖禁繫自然解脫師子虎狼諸惡餓鬼冤家盜賊不能逼害暴風猛火雲雷雨雹河海泛涱毒藥重病不能侵損若有念此毘俱胝名者菩薩恒時救護所有諸惡魔冤而來逼惱是時菩薩密放身光遍照虛空如百千日其光熾盛爍殄魔冤乃至天地悉皆清淨復令彼人智慧增長於七生中得宿命通生剎帝利族受國王身從此命終往生西方極樂世界
